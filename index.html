  const imgBounds = [[0, 0], [11000, 10000]];

  const map = L.map("map", {
    crs: L.CRS.Simple,
    zoomControl: false,
    maxBounds: imgBounds,
    maxBoundsViscosity: 1.0,
    attributionControl: false,
    inertia: true
  });

  L.imageOverlay("imgs/mapa.png", imgBounds).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  function ajustarMapaDinamico() {
    map.invalidateSize();

    // 1. Calculamos el zoom exacto para que TODO el mapa quepa en la pantalla
    // 'true' asegura que quepa completamente sin importar si la pantalla es vertical u horizontal
    const zoomDeEncaje = -2.75;

    // 2. Definimos los límites
    // minZoom es el de encaje (para que no se vea el fondo gris)
    // maxZoom es 1 (para poder acercarse a ver detalles)
    map.setMinZoom(zoomDeEncaje); 
    map.setMaxZoom(1);

    // 3. SE VE ALEJADO: Iniciamos el mapa con ese zoom de encaje
    // Centramos en el punto medio de tus coordenadas [[0,0], [11000, 10000]]
    map.setView([5500, 5000], zoomDeEncaje);
  }

  // Ejecutar al cargar y al cambiar tamaño
  window.onload = ajustarMapaDinamico;
  window.addEventListener('resize', () => {
    setTimeout(ajustarMapaDinamico, 0);
  });

      events: L.layerGroup().addTo(map),
      food: L.layerGroup().addTo(map)
    };

      const icon = L.icon({
        iconUrl: l.iconoPropio,
        iconSize: [50, 50], iconAnchor: [25, 50]
      });

      const marker = L.marker([l.y, l.x], { icon: icon });
      
      marker.on('click', () => {
        if (l.type === "event") {
          // Generar URL de Google Maps
          const destino = l.googleMaps ? l.googleMaps : encodeURIComponent(l.name + ' Ambato, Ecuador');
          const urlGoogle = `https://www.google.com/maps/search/?api=1&query=${destino}`;

          let html = `<h2 style="margin-bottom:10px;">${l.name}</h2>`;
          if(l.imagenLugar) html += `<img src="${l.imagenLugar}" class="sidebar-img">`;
          html += `
            <a href="${urlGoogle}" target="_blank" class="btn-como-llegar">
              🚗 Cómo llegar
            </a>
          `;

          if(l.cronograma) {
            html += `<h3 style="margin: 15px 0 10px;">Cronograma</h3>`;
            
            l.cronograma.forEach(d => {
                html += `<div style="background:#f9f9f9; padding:12px; border-radius:8px; border-left:4px solid #FFD700; margin-bottom:15px;">
                            <strong style="font-size:14px; display:block; margin-bottom:8px;">📅 ${d.dia}</strong>`;
                d.eventos.forEach(e => {
                    html += `<div style="margin-bottom: 8px; border-bottom: 1px dotted #ccc; padding-bottom: 4px;">
                                <span style="font-size:15px; font-weight:500; display:block;">• ${e.t}</span>
                                <small style="color:#666;">⏰ ${e.h}</small>
                             </div>`;
                });
                
                html += `</div>`;
            });
        }
          document.getElementById('sidebar-info').innerHTML = html;
          document.getElementById('sidebar').classList.add('open');
          map.panTo([l.y, l.x]);
        } else {
          window.open(l.url, "_blank");
        }
      });

      groups[l.type === "event" ? 'events' : 'food'].addLayer(marker);
    });

    // --- FILTROS ---
    function updateFilters() {
      const ev = document.getElementById('filter-events').checked;
      const fd = document.getElementById('filter-food').checked;
      
      ev ? map.addLayer(groups.events) : map.removeLayer(groups.events);
      fd ? map.addLayer(groups.food) : map.removeLayer(groups.food);
    }

    document.getElementById('filter-events').addEventListener('change', updateFilters);
    document.getElementById('filter-food').addEventListener('change', updateFilters);

  <script>
    map.on('click', function(e){
      const y = Math.round(e.latlng.lat);
      const x = Math.round(e.latlng.lng);
      console.log('Coordenadas en píxeles:', x, y);
      L.popup()
        .setLatLng([y, x])
        .setContent(`x: ${x} px<br>y: ${y} px`)
        .openOn(map);
    });
  
    // ejemplo: crear marcador con coordenadas conocidas
    function addMarkerAtPx(x, y, type='event', name='Lugar'){
      const latlng = [y, x]; // lat = y, lng = x en CRS.Simple
      const icon = type === 'food' ? icons.food : icons.event;
      const marker = L.marker(latlng, {icon}).addTo(map);
      marker.bindPopup(`<strong>${name}</strong><br>(${x}, ${y})`);
      return marker;
    }
  </script>
