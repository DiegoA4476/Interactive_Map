    /* Estilos específicos para esta página */
    body {

      background: linear-gradient(rgba(252, 199, 6, 0.20), rgba(252, 199, 6, 0.70)),

      background-position: center;

    .container {

      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      border-radius: 20px;

    .title-section {
      color: #fff;
      font-size: x-large;
      margin-bottom: 50px;
    }

    .sponsors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 10px;
    }

    .sponsor-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .sponsor-card:hover {
      transform: translateY(-5px);
    }

    .sponsor-logo {
      width: 100%;
      max-width: 150px;
      height: auto; /* Cambiado de 500px a auto para que no se deforme */
      object-fit: contain;
      margin-bottom: 15px;
    }

    .sponsor-link {
      text-decoration: none;
    }

    .sponsor-name {
      font-weight: bold;
      color: #1e5264;
      font-size: 1.1em;
    }

    .btn-back {

      text-decoration: none;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .btn-back:hover { background: #000; transform: scale(1.05); }
  </style>
